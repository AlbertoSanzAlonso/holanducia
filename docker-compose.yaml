version: '3.8'

services:
  # La API de FastAPI
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: holanducia_api
    restart: always
    ports:
      - "8000:8000"
    # Las variables se inyectan desde el panel de Coolify

  # El Worker que ejecuta los scrapers
  worker:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: holanducia_worker
    restart: always
    command: ["python", "scrapers/main.py"]

  # Redis para deduplicación y tareas
  redis:
    image: redis:alpine
    container_name: holanducia_redis
    ports:
      - "6379:6379"
    restart: always

networks:
  default:
    name: holanducia_network
