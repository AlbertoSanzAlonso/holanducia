version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: inmobiliaria_db
    restart: always
    environment:
      POSTGRES_DB: inmobiliaria
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: inmobiliaria_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
